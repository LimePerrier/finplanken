<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin - Bracket Planning</title>
<link rel="icon" type="image/svg+xml" href="assets/bracket-planning-icon.svg">
<link rel="alternate icon" type="image/png" href="assets/bracket-planning-icon.png">
<link rel="apple-touch-icon" href="assets/bracket-planning-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css?v=20260702-admin-actions">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="portal-body">
<main class="admin-shell">
  <section class="admin-header">
    <div>
      <a class="portal-logo" href="index.html">Bracket Planning</a>
      <h1>Admin</h1>
    </div>
    <label class="admin-token">Admin token<input id="admin-token" type="password" autocomplete="current-password"></label>
  </section>

  <section class="admin-grid">
    <div class="admin-card">
      <div class="admin-card-head">
        <h2>Clients</h2>
        <a class="btn dark" href="admin-invite.html">Invite Client</a>
      </div>
      <div id="client-list" class="client-list"></div>
    </div>

    <div class="admin-card">
      <div id="client-detail" class="client-detail empty">Select a client to view their data.</div>
    </div>
  </section>
</main>

<script>
(function () {
  var tokenInput = document.getElementById('admin-token');
  var list = document.getElementById('client-list');
  var detail = document.getElementById('client-detail');
  var selectedClientId = '';

  tokenInput.value = sessionStorage.getItem('bp_admin_token') || '';
  tokenInput.addEventListener('change', function () {
    sessionStorage.setItem('bp_admin_token', tokenInput.value);
    loadClients();
  });

  function adminHeaders() {
    return { 'content-type': 'application/json', 'x-admin-token': tokenInput.value };
  }

  async function api(path, options) {
    var response = await fetch(path, Object.assign({ headers: adminHeaders() }, options || {}));
    var text = await response.text();
    var data = {};
    try { data = text ? JSON.parse(text) : {}; } catch (error) {}
    if (!response.ok) throw new Error(data.error || text || 'Request failed.');
    return data;
  }

  function statusBadge(status) {
    return '<span class="status-badge ' + status + '">' + status + '</span>';
  }

  async function loadClients() {
    if (!tokenInput.value) {
      list.innerHTML = '<p class="muted">Enter your admin token to load clients.</p>';
      return;
    }
    list.innerHTML = '<p class="muted">Loading clients...</p>';
    try {
      var data = await api('/api/admin/clients');
      if (!data.clients.length) {
        list.innerHTML = '<p class="muted">No clients yet.</p>';
        return;
      }
      list.innerHTML = data.clients.map(function (client) {
        return '<button class="client-row" data-id="' + client.id + '">' +
          '<strong>' + escapeHtml(client.name || client.email) + '</strong>' +
          '<span>' + escapeHtml(client.email) + '</span>' +
          '<small>' + statusBadge(client.status) + ' ' + Number(client.record_count || 0) + ' records</small>' +
        '</button>';
      }).join('');
      list.querySelectorAll('.client-row').forEach(function (button) {
        button.addEventListener('click', function () {
          selectedClientId = button.getAttribute('data-id');
          loadClient(selectedClientId);
        });
      });
      if (selectedClientId) loadClient(selectedClientId);
    } catch (error) {
      list.innerHTML = '<p class="portal-status">' + escapeHtml(error.message) + '</p>';
    }
  }

  async function loadClient(id) {
    detail.innerHTML = '<p class="muted">Loading client...</p>';
    try {
      var data = await api('/api/admin/clients/' + encodeURIComponent(id));
      var client = data.client;
      detail.innerHTML =
        '<div class="client-detail-head">' +
          '<div><h2>' + escapeHtml(client.name || client.email) + '</h2><p>' + escapeHtml(client.email) + '</p></div>' +
          statusBadge(client.status) +
        '</div>' +
        '<div class="admin-actions">' +
          '<button class="btn ghost" id="toggle-status">' + (client.status === 'disabled' ? 'Reactivate Login' : 'Suspend Login') + '</button>' +
          '<button class="btn ghost" id="reset-password" type="button">Reset Password</button>' +
        '</div>' +
        '<div id="admin-action-status" class="portal-status"></div>' +
        '<form id="record-form" class="portal-form record-form">' +
          '<h3>Add client data</h3>' +
          '<label>Title<input id="record-title" required></label>' +
          '<label>Type<select id="record-type"><option value="note">Note</option><option value="questionnaire">Questionnaire</option><option value="document">Document</option><option value="planning">Planning Data</option></select></label>' +
          '<label>Details<textarea id="record-body" required></textarea></label>' +
          '<label class="checkbox-line"><input id="record-visible" type="checkbox"> Visible to client later</label>' +
          '<button class="btn dark" type="submit">Add Data</button>' +
          '<div id="record-status" class="portal-status"></div>' +
        '</form>' +
        '<form id="document-form" class="portal-form record-form">' +
          '<h3>Upload client document</h3>' +
          '<label>Title<input id="document-title" required></label>' +
          '<label>Slot<select id="document-type"><option value="plan_pdf">Plan PDF</option><option value="spreadsheet">Excel Spreadsheet</option><option value="docx">Word Document</option></select></label>' +
          '<label>File<input id="document-file" type="file" required></label>' +
          '<button class="btn dark" type="submit">Upload Document</button>' +
          '<div id="document-status" class="portal-status"></div>' +
        '</form>' +
        '<h3>Client documents</h3>' +
        '<div class="record-list">' + renderDocuments(data.documents, client.id) + '</div>' +
        '<h3>Questionnaire answers</h3>' +
        renderQuestionnaireEditor(data.questionnaire) +
        '<h3>Existing data</h3>' +
        '<div class="record-list">' + renderRecords(data.records) + '</div>' +
        '<h3>Invite history</h3>' +
        '<div class="record-list compact">' + renderInvites(data.invites) + '</div>';

      document.getElementById('toggle-status').addEventListener('click', async function () {
        var nextStatus = client.status === 'disabled' ? 'active' : 'disabled';
        await api('/api/admin/clients/' + encodeURIComponent(id), {
          method: 'PATCH',
          body: JSON.stringify({ status: nextStatus })
        });
        loadClients();
        loadClient(id);
      });

      document.getElementById('reset-password').addEventListener('click', async function () {
        var status = document.getElementById('admin-action-status');
        if (!confirm('Send a new password setup link to ' + client.email + '? Their current sessions will be signed out.')) return;
        status.textContent = 'Creating password reset link...';
        try {
          var result = await api('/api/admin/clients/' + encodeURIComponent(id) + '/reset-password', {
            method: 'POST',
            body: JSON.stringify({})
          });
          status.innerHTML = result.emailSent
            ? 'Password reset email sent.'
            : 'Email is not configured. Use this reset link: <a href="' + escapeAttr(result.resetUrl) + '">' + escapeHtml(result.resetUrl) + '</a>';
          loadClients();
        } catch (error) {
          status.textContent = error.message;
        }
      });

      document.getElementById('record-form').addEventListener('submit', async function (event) {
        event.preventDefault();
        var status = document.getElementById('record-status');
        status.textContent = 'Adding data...';
        try {
          await api('/api/admin/clients/' + encodeURIComponent(id) + '/records', {
            method: 'POST',
            body: JSON.stringify({
              title: document.getElementById('record-title').value,
              recordType: document.getElementById('record-type').value,
              body: document.getElementById('record-body').value,
              visibleToClient: document.getElementById('record-visible').checked
            })
          });
          loadClients();
          loadClient(id);
        } catch (error) {
          status.textContent = error.message;
        }
      });

      document.getElementById('document-form').addEventListener('submit', async function (event) {
        event.preventDefault();
        var status = document.getElementById('document-status');
        var file = document.getElementById('document-file').files[0];
        if (!file) {
          status.textContent = 'Choose a file to upload.';
          return;
        }
        status.textContent = 'Uploading document...';
        var formData = new FormData();
        formData.append('title', document.getElementById('document-title').value);
        formData.append('documentType', document.getElementById('document-type').value);
        formData.append('file', file);
        if (document.getElementById('document-type').value === 'spreadsheet') {
          try {
            status.textContent = 'Reading spreadsheet...';
            formData.append('dashboardData', JSON.stringify(await parseDashboardWorkbook(file)));
          } catch (error) {
            status.textContent = error.message;
            return;
          }
        }
        status.textContent = 'Uploading document...';
        try {
          var response = await fetch('/api/admin/clients/' + encodeURIComponent(id) + '/documents', {
            method: 'POST',
            headers: { 'x-admin-token': tokenInput.value },
            body: formData
          });
          var text = await response.text();
          var data = {};
          try { data = text ? JSON.parse(text) : {}; } catch (error) {}
          if (!response.ok) throw new Error(data.error || text || 'Upload failed.');
          loadClient(id);
        } catch (error) {
          status.textContent = error.message;
        }
      });

      var questionnaireForm = document.getElementById('admin-questionnaire-form');
      detail.querySelectorAll('[data-delete-document]').forEach(function (button) {
        button.addEventListener('click', async function () {
          var status = document.getElementById('document-status');
          var docTitle = button.getAttribute('data-document-title') || 'this document';
          if (!confirm('Delete ' + docTitle + '? This removes the file from the client portal.')) return;
          status.textContent = 'Deleting document...';
          try {
            await api('/api/admin/clients/' + encodeURIComponent(id) + '/documents/' + encodeURIComponent(button.dataset.deleteDocument), {
              method: 'DELETE'
            });
            loadClient(id);
          } catch (error) {
            status.textContent = error.message;
          }
        });
      });
      questionnaireForm.addEventListener('click', function (event) {
        var addButton = event.target.closest('[data-admin-add-row]');
        var removeButton = event.target.closest('[data-admin-remove-row]');
        if (addButton) {
          var question = data.questionnaire.questions.find(function (item) { return item.id === addButton.dataset.adminAddRow; });
          var container = document.getElementById('admin-q-' + question.id);
          var count = container.querySelectorAll('.repeat-row').length;
          container.insertAdjacentHTML('beforeend', renderAdminRepeatRow(question, {}, count));
        }
        if (removeButton) {
          removeButton.closest('.repeat-row').remove();
        }
      });
      questionnaireForm.addEventListener('submit', async function (event) {
        event.preventDefault();
        var status = document.getElementById('admin-questionnaire-status');
        status.textContent = 'Saving questionnaire...';
        try {
          await api('/api/admin/clients/' + encodeURIComponent(id) + '/questionnaire', {
            method: 'POST',
            body: JSON.stringify({
              status: document.getElementById('questionnaire-response-status').value,
              answers: collectAdminQuestionnaire(data.questionnaire.questions)
            })
          });
          status.textContent = 'Questionnaire saved.';
          loadClient(id);
        } catch (error) {
          status.textContent = error.message;
        }
      });
    } catch (error) {
      detail.innerHTML = '<p class="portal-status">' + escapeHtml(error.message) + '</p>';
    }
  }

  async function parseDashboardWorkbook(file) {
    if (!window.XLSX) throw new Error('Spreadsheet parser did not load. Refresh the admin page and try again.');
    var buffer = await file.arrayBuffer();
    var workbook = XLSX.read(buffer, { type: 'array' });
    var sheet = workbook.Sheets[workbook.SheetNames[0]];
    var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: null });
    var data = [];
    for (var i = 7; i < rows.length; i++) {
      var row = rows[i] || [];
      var year = toNumber(row[0]);
      var age = toNumber(row[1]);
      if (!year || !age) continue;
      data.push({
        year: year,
        age: age,
        expBase: toNumber(row[6]),
        expAdd: toNumber(row[8]),
        employment: toNumber(row[11]),
        divNonElig: toNumber(row[12]),
        divElig: toNumber(row[13]),
        otherInc: toNumber(row[14]),
        cpp: toNumber(row[15]),
        cppSurv: toNumber(row[16]),
        oas: toNumber(row[17]),
        oasClawback: toNumber(row[18]),
        govTotal: toNumber(row[19]),
        taxableInc: toNumber(row[20]),
        cppEi: toNumber(row[21]),
        totalTax: toNumber(row[22]),
        marginal: toNumber(row[23]),
        effective: toNumber(row[24]),
        totalTaxPrem: toNumber(row[25]),
        rrspVal: toNumber(row[26]),
        rrspContrib: toNumber(row[27]),
        tfsaVal: toNumber(row[29]),
        tfsaContrib: toNumber(row[30]),
        nonRegVal: toNumber(row[32]),
        nonRegContrib: toNumber(row[33]),
        allTypesVal: toNumber(row[45]),
        allTypesContrib: toNumber(row[46]),
        house: toNumber(row[47]),
        realTotal: toNumber(row[48]),
        realPurchSold: toNumber(row[49]),
        mortOwing: toNumber(row[50]),
        mortPaid: toNumber(row[51]),
        netWorth: toNumber(row[59]),
        estateBeforeTax: toNumber(row[60]),
        estateTaxInc: toNumber(row[61]),
        taxOnEstate: toNumber(row[62])
      });
    }
    if (!data.length) throw new Error('Could not find dashboard rows in this spreadsheet.');
    return data;
  }

  function toNumber(value) {
    var numeric = Number(value);
    return Number.isFinite(numeric) ? numeric : 0;
  }

  function renderRecords(records) {
    if (!records.length) return '<p class="muted">No data has been added for this client yet.</p>';
    return records.map(function (record) {
      return '<article class="record-item">' +
        '<div><strong>' + escapeHtml(record.title) + '</strong><small>' + escapeHtml(record.record_type) + ' - ' + formatDate(record.created_at) + '</small></div>' +
        '<p>' + escapeHtml(record.body).replace(/\n/g, '<br>') + '</p>' +
      '</article>';
    }).join('');
  }

  function renderInvites(invites) {
    if (!invites.length) return '<p class="muted">No invites found.</p>';
    return invites.map(function (invite) {
      var state = invite.used_at ? 'used' : 'pending';
      return '<article class="record-item"><strong>' + state + '</strong><small>Created ' + formatDate(invite.created_at) + '</small></article>';
    }).join('');
  }

  function renderDocuments(documents) {
    if (!documents.length) return '<p class="muted">No documents uploaded yet.</p>';
    return documents.map(function (document) {
      return '<article class="record-item document-record">' +
        '<div><strong>' + escapeHtml(document.title) + '</strong><small>' + escapeHtml(document.document_type) + ' - ' + escapeHtml(document.file_name) + ' - ' + formatDate(document.uploaded_at) + '</small></div>' +
        '<button class="text-button danger" type="button" data-delete-document="' + escapeAttr(document.id) + '" data-document-title="' + escapeAttr(document.title) + '">Delete</button>' +
      '</article>';
    }).join('');
  }

  function renderQuestionnaireEditor(questionnaire) {
    if (!questionnaire) return '<p class="muted">No questionnaire available yet.</p>';
    var answers = questionnaire.answers || {};
    var html = '<form id="admin-questionnaire-form" class="portal-form record-form admin-questionnaire-form">' +
      '<label>Response status<select id="questionnaire-response-status">' +
        '<option value="draft"' + (questionnaire.status !== 'submitted' ? ' selected' : '') + '>Draft</option>' +
        '<option value="submitted"' + (questionnaire.status === 'submitted' ? ' selected' : '') + '>Submitted</option>' +
      '</select></label>' +
      '<p class="muted">Updated ' + formatDate(questionnaire.updated_at) + '</p>';
    (questionnaire.questions || []).forEach(function (question) {
      if (question.type === 'section') {
        html += '<h4 class="admin-question-section">' + escapeHtml(question.label) + '</h4>';
        return;
      }
      html += renderAdminQuestionField(question, answers[question.id]);
    });
    html += '<div class="questionnaire-actions"><button class="btn dark" type="submit">Save Questionnaire</button><span id="admin-questionnaire-status" class="portal-status"></span></div></form>';
    return html;
  }

  function renderAdminQuestionField(question, answer) {
    if (question.type === 'repeater') {
      var rows = Array.isArray(answer) && answer.length ? answer : [{}];
      return '<fieldset class="repeat-question"><legend>' + escapeHtml(question.label) + '</legend>' +
        '<div id="admin-q-' + escapeAttr(question.id) + '" class="repeat-rows">' + rows.map(function (row, index) {
          return renderAdminRepeatRow(question, row, index);
        }).join('') + '</div>' +
        '<button class="btn ghost small-btn" type="button" data-admin-add-row="' + escapeAttr(question.id) + '">' + escapeHtml(question.addLabel || 'Add row') + '</button>' +
      '</fieldset>';
    }
    var value = String(answer || '');
    var field = question.type === 'textarea'
      ? '<textarea id="admin-q-' + escapeAttr(question.id) + '" data-admin-question="' + escapeAttr(question.id) + '">' + escapeHtml(value) + '</textarea>'
      : '<input id="admin-q-' + escapeAttr(question.id) + '" data-admin-question="' + escapeAttr(question.id) + '" value="' + escapeAttr(value) + '">';
    return '<label class="question-field">' + escapeHtml(question.label) + field + '</label>';
  }

  function renderAdminRepeatRow(question, row, index) {
    row = row || {};
    return '<div class="repeat-row" data-row="' + index + '">' +
      '<div class="repeat-row-head"><b>' + escapeHtml(question.label) + ' #' + (index + 1) + '</b><button type="button" class="text-button" data-admin-remove-row>Remove</button></div>' +
      '<div class="repeat-fields">' + question.fields.map(function (field) {
        return '<label>' + escapeHtml(field.label) + '<input data-admin-repeat="' + escapeAttr(question.id) + '" data-field="' + escapeAttr(field.id) + '" value="' + escapeAttr(row[field.id] || '') + '"></label>';
      }).join('') + '</div>' +
    '</div>';
  }

  function collectAdminQuestionnaire(questions) {
    var payload = {};
    questions.forEach(function (question) {
      if (question.type === 'section') return;
      if (question.type === 'repeater') {
        var container = document.getElementById('admin-q-' + question.id);
        payload[question.id] = Array.prototype.map.call(container.querySelectorAll('.repeat-row'), function (row) {
          var item = {};
          question.fields.forEach(function (field) {
            var input = row.querySelector('[data-field="' + field.id + '"]');
            item[field.id] = input ? input.value : '';
          });
          return item;
        }).filter(function (row) {
          return Object.keys(row).some(function (key) { return String(row[key] || '').trim(); });
        });
        return;
      }
      var input = document.getElementById('admin-q-' + question.id);
      payload[question.id] = input ? input.value : '';
    });
    return payload;
  }

  function formatDate(value) {
    return value ? new Date(value).toLocaleString() : '';
  }

  function escapeHtml(value) {
    return String(value || '').replace(/[&<>"']/g, function (char) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
    });
  }

  function escapeAttr(value) {
    return escapeHtml(value).replace(/`/g, '&#96;');
  }

  loadClients();
})();
</script>
</body>
</html>
