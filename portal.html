<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Client Portal - Bracket Planning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css?v=20260702-portal">
</head>
<body class="portal-body">
<main class="portal-shell">
  <section class="portal-panel portal-panel-wide">
    <a class="portal-logo" href="index.html">Bracket Planning</a>
    <h1>Client portal</h1>
    <p id="portal-message" class="muted">Checking your session...</p>
    <button id="logout" class="btn ghost" type="button">Log out</button>
  </section>
</main>
<script>
(async function () {
  var message = document.getElementById('portal-message');
  var response = await fetch('/api/auth/me');
  if (!response.ok) {
    window.location.href = 'login.html';
    return;
  }
  var data = await response.json();
  message.textContent = 'Logged in as ' + data.user.email + '.';
  document.getElementById('logout').addEventListener('click', async function () {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = 'login.html';
  });
})();
</script>
</body>
</html>
